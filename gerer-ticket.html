<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexto — Ticket généré</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <span class="nav-brand">Nexto</span>
</nav>

<main>
  <div class="check-icon">
    
  </div>

  <h1>Ticket généré</h1>
  <p class="subtitle">Votre ticket a été créé avec succès</p>

  <div class="ticket-card">
    <div class="ticket-number">B12</div>

    <hr class="divider"/>

    <div class="ticket-info">
      <div class="ticket-info-label">Service</div>
      <div class="ticket-info-value">État Civil</div>
    </div>

    <div class="ticket-info">
      <div class="ticket-info-label">Heure du ticket</div>
      <div class="ticket-info-value">14:23</div>
    </div>

    <hr class="divider-2"/>

    <div class="attente-box">
      Veuillez attendre votre tour
    </div>
  </div>

  <a href="#" class="btn-retour">Retour à l'accueil</a>

  <p class="note">Vous serez notifié lorsque ce sera votre tour. Gardez votre numéro de ticket visible.</p>
</main>

</body>
</html>
