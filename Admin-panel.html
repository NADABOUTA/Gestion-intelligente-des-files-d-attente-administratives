<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Nexto - Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Nexto</div>
  <nav>
    <a href="index.html">Accueil</a>
  </nav>
</header>

<!-- ADMIN WRAPPER -->
<div class="admin-wrapper">

  <!-- COLONNE GAUCHE -->
  <div class="admin-left">

    <!-- INFORMATIONS ACTUELLES -->
    <div class="admin-card">
      <h3 class="admin-section-title">INFORMATIONS ACTUELLES</h3>

      <div class="admin-info-row">
        <div class="admin-info-box">
          <p class="admin-info-label">NUMERO ACTUEL</p>
          <p class="admin-info-value">N23</p>
        </div>
        <div class="admin-info-box">
          <p class="admin-info-label">GUICHET</p>
          <p class="admin-info-value">04</p>
        </div>
      </div>

      <h3 class="admin-section-title" style="margin-top: 24px;">ACTIONS</h3>

      <button class="admin-btn-primary">APPELER SUIVANT</button>
      <button class="admin-btn-secondary">ANNULER TICKET</button>
      <button class="admin-btn-secondary">RÉINITIALISER</button>
    </div>

    <!-- HISTORIQUE -->
    <div class="admin-card" style="margin-top: 16px;">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Status</th>
            <th>Status</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>N21</td>
            <td>14:32</td>
            <td>Terminé</td>
          </tr>
          <tr>
            <td>N20</td>
            <td>14:20</td>
            <td>Terminé</td>
          </tr>
          <tr>
            <td>N19</td>
            <td>13:40</td>
            <td>Terminé</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <!-- COLONNE DROITE -->
  <div class="admin-right">
    <div class="admin-card">

      <div class="admin-queue-header">
        <h3 class="admin-section-title" style="margin-bottom: 4px;">FILE D'ATTENTE</h3>
        <div class="admin-queue-meta">
          <span>Ticket en attente</span>
          <span class="admin-queue-count">3</span>
        </div>
      </div>

      <div class="admin-queue-item active">
        <div>
          <p class="admin-queue-num">N35</p>
          <p class="admin-queue-time">Temps d'attente: 12</p>
        </div>
        <span class="badge-suivant">Suivant</span>
      </div>

      <div class="admin-queue-item">
        <div>
          <p class="admin-queue-num">N36</p>
          <p class="admin-queue-time">Temps d'attente: 18 min</p>
        </div>
      </div>

      <div class="admin-queue-item">
        <div>
          <p class="admin-queue-num">N37</p>
          <p class="admin-queue-time">Temps d'attente: 24 min</p>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
