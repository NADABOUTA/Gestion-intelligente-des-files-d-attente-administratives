<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexto — Service Administratif</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <b>Nexto</b>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <h1>Bienvenue sur Nexto</h1>
    <p>Prenez un ticket pour votre service administratif</p>

    <form action="#" method="get">

      <p>
        <label>
          <input type="radio" name="service" value="carte_identite" />
          Carte d'identité / Passeport
        </label>
      </p>

      <p>
        <label>
          <input type="radio" name="service" value="permis_conduire" />
          Permis de conduire
        </label>
      </p>

      <p>
        <label>
          <input type="radio" name="service" value="certificat_residence" />
          Certificat de résidence
        </label>
      </p>

      <p>
        <label>
          <input type="radio" name="service" value="impots_taxes" />
          Impôts / Taxes
        </label>
      </p>

      <p>
        <a href="Liste-attente.html" >Prendre un ticket</a>
        
      </p>

    </form>

    <p><small>ℹ️ Veuillez patienter après avoir pris votre ticket</small></p>
  </main>

</body>
</html>
